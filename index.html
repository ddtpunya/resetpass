<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Reset Portal</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b1220;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:#fff;
}

.card{
    width:480px;
    max-width:95%;
    background:linear-gradient(180deg,#111827,#0f172a);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    padding:28px;
    box-shadow:0 30px 80px rgba(0,0,0,.55);
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h1{
    margin:0;
    font-size:20px;
    font-weight:600;
}

.header p{
    margin-top:6px;
    color:#94a3b8;
    font-size:12px;
}

.status-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;
    padding:10px 14px;
    border-radius:12px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.06);
}

.live{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    color:#34d399;
}

.live-dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#34d399;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{opacity:1}
    50%{opacity:.3}
    100%{opacity:1}
}

.countdown{
    font-size:12px;
    color:#cbd5e1;
}

.input{
    width:100%;
    padding:13px 14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.03);
    color:white;
    outline:none;
    margin-bottom:14px;
    font-size:13px;
}

.input:focus{
    border-color:#3b82f6;
    box-shadow:0 0 0 3px rgba(59,130,246,.15);
}

.btn{
    width:100%;
    border:none;
    cursor:pointer;
    padding:13px;
    border-radius:12px;
    font-weight:600;
    transition:.2s;
}

.btn-primary{
    background:#2563eb;
    color:white;
}

.btn-primary:hover{
    background:#1d4ed8;
}

.result{
    margin-top:15px;
    padding:16px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.06);
    background:rgba(255,255,255,.03);
    white-space:pre-line;
    font-size:12.5px;
    line-height:1.7;
    min-height:180px;
}

.btn-copy{
    margin-top:12px;
    background:rgba(16,185,129,.15);
    color:#34d399;
    border:1px solid rgba(16,185,129,.3);
}

.btn-copy:hover{
    background:rgba(16,185,129,.25);
}

.toast{
    position:fixed;
    left:50%;
    bottom:40px;
    transform:translateX(-50%);
    background:rgba(0,0,0,.85);
    color:white;
    padding:10px 16px;
    border-radius:999px;
    font-size:12px;
    opacity:0;
    visibility:hidden;
    transition:.3s;
}

.toast.show{
    opacity:1;
    visibility:visible;
    bottom:60px;
}
</style>
</head>

<body>

<div class="card">

    <div class="header">
        <h1>Secure Reset Portal</h1>
        <p>Authentication & Password Recovery System</p>
    </div>

    <div class="status-bar">
        <div class="live">
            <span class="live-dot"></span>
            <span>SYSTEM ONLINE</span>
        </div>

        <div class="countdown">
            Next refresh: <span id="timer">10</span>s
        </div>
    </div>

    <input
        type="text"
        id="username"
        class="input"
        placeholder="Enter User ID"
    >

    <button class="btn btn-primary" onclick="generate()">
        Generate Reset
    </button>

    <div id="output" class="result">
System ready...
    </div>

    <button class="btn btn-copy" onclick="copyResult()">
        Copy Result
    </button>

</div>

<div id="toast" class="toast"></div>

<script>
let lastResult = "";
let countdown = 10;

function randomCode() {
    const letters = "abcdefghijklmnopqrstuvwxyz";
    const numbers = "0123456789";

    let result = "";

    for(let i=0;i<3;i++){
        result += letters[Math.floor(Math.random()*letters.length)];
    }

    for(let i=0;i<3;i++){
        result += numbers[Math.floor(Math.random()*numbers.length)];
    }

    return result;
}

function generate(){

    const user = document.getElementById("username").value.trim();

    if(!user){
        showToast("User ID required");
        return;
    }

    const password = randomCode();

    lastResult =
`Yth, Kami sudah berhasil Mereset kembali password anda,

User ID : ${user}
Password : ${password}

Silahkan mencoba login kembali ya bosku,

Mohon Rahasiakan data anda dari orang lain, dan silahkan ke menu ubah Password untuk mengubah Password anda kembali ya bosku.

Terima kasih.`;

    document.getElementById("output").innerText = lastResult;

    countdown = 10;
}

function copyResult(){

    if(!lastResult){
        showToast("Nothing to copy");
        return;
    }

    navigator.clipboard.writeText(lastResult)
        .then(() => showToast("Copied"))
        .catch(() => showToast("Copy failed"));
}

function showToast(message){

    const toast = document.getElementById("toast");

    toast.innerText = message;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 1800);
}

/* Countdown + Auto Generate */
setInterval(() => {

    document.getElementById("timer").innerText = countdown;

    countdown--;

    if(countdown < 0){

        const user = document
            .getElementById("username")
            .value
            .trim();

        if(user){
            generate();
        }

        countdown = 10;
    }

}, 1000);
</script>

</body>
</html>
