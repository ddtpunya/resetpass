<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Reset System</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #1f2937, #0f172a);
  color: #e5e7eb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 420px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 25px;
  backdrop-filter: blur(12px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

h2 {
  text-align: center;
  font-weight: 600;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border: none;
  border-radius: 10px;
  outline: none;
  background: rgba(255,255,255,0.08);
  color: white;
}

input::placeholder {
  color: #9ca3af;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

.btn-primary {
  background: #3b82f6;
  color: white;
}

.btn-primary:hover {
  background: #2563eb;
}

.btn-copy {
  margin-top: 10px;
  background: #10b981;
  color: white;
}

.btn-copy:hover {
  background: #059669;
}

.result {
  margin-top: 18px;
  padding: 14px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  font-size: 13px;
  line-height: 1.5;
  white-space: pre-line;
  border: 1px solid rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<div class="card">
  <h2>Password Reset System</h2>

  <input type="text" id="username" placeholder="Enter User ID">

  <button class="btn-primary" onclick="generate()">Generate Reset</button>

  <div class="result" id="output">
System ready...
  </div>

  <button class="btn-copy" onclick="copyResult()">Copy Result</button>
</div>

<script>
let lastResult = "";

function randomCode() {
  const letters = "abcdefghijklmnopqrstuvwxyz";
  const numbers = "0123456789";

  let code = "";

  for (let i = 0; i < 3; i++) {
    code += letters[Math.floor(Math.random() * letters.length)];
  }

  for (let i = 0; i < 3; i++) {
    code += numbers[Math.floor(Math.random() * numbers.length)];
  }

  return code;
}

function generate() {
  let user = document.getElementById("username").value;

  if (!user) {
    alert("User ID wajib diisi!");
    return;
  }

  let pass = randomCode();

  lastResult =
`SYSTEM NOTIFICATION

Dear User,

Your password reset request has been successfully processed.

User ID   : ${user}
Password   : ${pass}

Please use the new password to login.
For security reasons, do not share your credentials with anyone.

Thank you.`;

  document.getElementById("output").innerHTML = lastResult;
}

function copyResult() {
  if (!lastResult) {
    alert("No data to copy!");
    return;
  }

  navigator.clipboard.writeText(lastResult)
    .then(() => alert("Copied to clipboard!"))
    .catch(() => alert("Copy failed!"));
}
</script>

</body>
</html>
