<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DINGDONGTOGEL</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b1220;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:#fff;
    padding:20px;
}

.card{
    width:500px;
    max-width:100%;
    background:linear-gradient(180deg,#111827,#0f172a);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:28px;
    box-shadow:
        0 20px 50px rgba(0,0,0,.5),
        0 0 0 1px rgba(255,255,255,.03);
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h1{
    font-size:22px;
    font-weight:600;
    margin-bottom:6px;
}

.header p{
    color:#94a3b8;
    font-size:13px;
}

.status{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 14px;
    border-radius:14px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.06);
    margin-bottom:16px;
}

.live{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    color:#34d399;
    font-weight:600;
}

.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#34d399;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{opacity:1}
    50%{opacity:.3}
    100%{opacity:1}
}

.countdown{
    font-size:12px;
    color:#cbd5e1;
}

.result{
    margin-top:15px;
    padding:18px;
    border-radius:16px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.06);
    min-height:220px;
    white-space:pre-line;
    line-height:1.8;
    font-size:13px;
}

.btn-copy{
    width:100%;
    margin-top:14px;
    border:none;
    cursor:pointer;
    padding:13px;
    border-radius:14px;
    font-weight:600;
    font-size:13px;
    background:rgba(16,185,129,.15);
    color:#34d399;
    border:1px solid rgba(16,185,129,.3);
    transition:.2s;
}

.btn-copy:hover{
    background:rgba(16,185,129,.25);
}

.toast{
    position:fixed;
    left:50%;
    bottom:40px;
    transform:translateX(-50%);
    background:rgba(0,0,0,.85);
    color:white;
    padding:10px 16px;
    border-radius:999px;
    font-size:12px;
    opacity:0;
    visibility:hidden;
    transition:.3s;
}

.toast.show{
    opacity:1;
    visibility:visible;
    bottom:60px;
}
</style>
</head>

<body>

<div class="card">

    <div class="header">
        <h1>RANDOM PASSWORD</h1>
    </div>

   <div class="status">
    <div class="live">
        <span class="dot"></span>
        <span>AUTO REFRESH ACTIVE</span>
    </div>

    <div class="countdown">
        Refresh Interval: 1 Second
    </div>
</div>

    <div id="output" class="result">
Initializing system...
    </div>

    <button class="btn-copy" onclick="copyResult()">
        Copy Result
    </button>

</div>

<div id="toast" class="toast"></div>

<script>
let lastResult = "";
setInterval(() => {
    generate();
}, 1000);

function randomCode() {

    const letters = "abcdefghijklmnopqrstuvwxyz";
    const numbers = "0123456789";

    let result = "";

    for(let i=0;i<4;i++){
        result += letters[Math.floor(Math.random() * letters.length)];
    }

    for(let i=0;i<3;i++){
        result += numbers[Math.floor(Math.random() * numbers.length)];
    }

    return result;
}

function generate() {

    const password = randomCode();

    lastResult =
`Yth, Kami sudah berhasil Mereset kembali password anda,

User ID :
Password : ${password}

Silahkan mencoba login kembali ya bosku,

Mohon Rahasiakan data anda dari orang lain, dan silahkan ke menu ubah Password untuk mengubah Password anda kembali ya bosku.

Terima kasih.`;

    document.getElementById("output").innerText = lastResult;

    countdown = 1;
}

function copyResult() {

    if(!lastResult){
        showToast("Nothing to copy");
        return;
    }

    navigator.clipboard.writeText(lastResult)
        .then(() => showToast("Copied to clipboard"))
        .catch(() => showToast("Copy failed"));
}

function showToast(message){

    const toast = document.getElementById("toast");

    toast.innerText = message;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 1800);
}

generate();

</script>

</body>
</html>
