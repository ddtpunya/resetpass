<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Reset System</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #1f2937, #0f172a);
  color: #e5e7eb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CARD */
.card {
  width: 440px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 26px;
  backdrop-filter: blur(12px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

h2 {
  text-align: center;
  font-weight: 600;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

/* INPUT (lebih presisi) */
input {
  width: 100%;
  padding: 10px 12px;
  margin-bottom: 12px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  outline: none;
  background: rgba(255,255,255,0.06);
  color: #e5e7eb;
  font-size: 13px;
  letter-spacing: 0.3px;
  transition: 0.2s;
}

input:focus {
  border: 1px solid rgba(59, 130, 246, 0.7);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
  background: rgba(255,255,255,0.08);
}

input::placeholder {
  color: rgba(156, 163, 175, 0.8);
  font-size: 12px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

.btn-primary {
  background: #3b82f6;
  color: white;
}

.btn-primary:hover {
  background: #2563eb;
}

.btn-copy {
  margin-top: 10px;
  background: #10b981;
  color: white;
}

.btn-copy:hover {
  background: #059669;
}

/* RESULT */
.result {
  margin-top: 18px;
  padding: 14px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-line;
  border: 1px solid rgba(255,255,255,0.08);
  min-height: 130px;
}

/* TOAST */
#toast {
  visibility: hidden;
  min-width: 180px;
  background: rgba(16, 185, 129, 0.95);
  color: white;
  text-align: center;
  border-radius: 10px;
  padding: 12px;
  position: fixed;
  left: 50%;
  bottom: 40px;
  transform: translateX(-50%);
  font-size: 14px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  opacity: 0;
  transition: all 0.4s ease;
}

#toast.show {
  visibility: visible;
  opacity: 1;
  bottom: 60px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Password Reset System</h2>

  <input type="text" id="username" placeholder="Enter User ID">

  <button class="btn-primary" onclick="generate()">Generate Reset</button>

  <div class="result" id="output">
System ready...
  </div>

  <button class="btn-copy" onclick="copyResult()">Copy Result</button>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
let lastResult = "";

function randomCode() {
  const letters = "abcdefghijklmnopqrstuvwxyz";
  const numbers = "0123456789";

  let code = "";

  for (let i = 0; i < 3; i++) {
    code += letters[Math.floor(Math.random() * letters.length)];
  }

  for (let i = 0; i < 3; i++) {
    code += numbers[Math.floor(Math.random() * numbers.length)];
  }

  return code;
}

function generate() {
  let user = document.getElementById("username").value.trim();

  if (!user) {
    showToast("User ID wajib diisi!");
    return;
  }

  let pass = randomCode();

  lastResult =
`Yth, Kami sudah berhasil Mereset kembali password anda,

User ID : ${user}
Password : ${pass}

Silahkan mencoba login kembali ya bosku,
Mohon Rahasiakan data anda dari orang lain,
Silahkan ke menu ubah Password untuk mengubah Password anda kembali ya bosku,

Terima kasih.`;

  document.getElementById("output").innerText = lastResult;
}

function copyResult() {
  if (!lastResult) {
    showToast("No data to copy!");
    return;
  }

  navigator.clipboard.writeText(lastResult)
    .then(() => showToast("Copied to clipboard!"))
    .catch(() => showToast("Copy failed!"));
}

function showToast(message) {
  const toast = document.getElementById("toast");
  toast.innerText = message;
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 2000);
}
</script>

</body>
</html>
