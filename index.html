<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Reset Portal</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: #0b0f17;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: #e5e7eb;
}

/* OUTER FRAME */
.wrapper {
  width: 460px;
  padding: 18px;
}

/* CARD (BANK / APPLE STYLE) */
.card {
  background: linear-gradient(180deg, #121826, #0f172a);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  padding: 28px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}

/* HEADER */
h1 {
  font-size: 18px;
  font-weight: 600;
  text-align: center;
  margin-bottom: 6px;
}

.subtitle {
  text-align: center;
  font-size: 12px;
  color: rgba(156,163,175,0.8);
  margin-bottom: 22px;
}

/* INPUT */
.input {
  width: 100%;
  box-sizing: border-box;
  padding: 12px 14px;
  margin-bottom: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  color: white;
  font-size: 13px;
  outline: none;
  transition: 0.2s;
}

.input:focus {
  border-color: rgba(59,130,246,0.7);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  transition: 0.2s;
}

.btn-primary {
  background: #2563eb;
  color: white;
}

.btn-primary:hover {
  background: #1d4ed8;
}

/* RESULT PANEL */
.result {
  margin-top: 16px;
  padding: 16px;
  border-radius: 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  font-size: 12.5px;
  line-height: 1.6;
  white-space: pre-line;
  min-height: 140px;
  color: #e5e7eb;
}

/* COPY BUTTON */
.btn-copy {
  margin-top: 10px;
  background: rgba(16,185,129,0.15);
  color: #34d399;
  border: 1px solid rgba(16,185,129,0.3);
}

.btn-copy:hover {
  background: rgba(16,185,129,0.25);
}

/* TOAST */
#toast {
  position: fixed;
  left: 50%;
  bottom: 40px;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  color: white;
  padding: 10px 14px;
  border-radius: 999px;
  font-size: 12px;
  opacity: 0;
  visibility: hidden;
  transition: 0.3s;
}

#toast.show {
  opacity: 1;
  visibility: visible;
  bottom: 60px;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card">

    <h1>Secure Reset Portal</h1>
    <div class="subtitle">Authentication & Password Recovery System</div>

    <input class="input" type="text" id="username" placeholder="User ID">

    <button class="btn btn-primary" onclick="generate()">Generate Reset</button>

    <div class="result" id="output">
System ready...
    </div>

    <button class="btn btn-copy" onclick="copyResult()">Copy Result</button>

  </div>
</div>

<div id="toast"></div>

<script>
let lastResult = "";

function randomCode() {
  const letters = "abcdefghijklmnopqrstuvwxyz";
  const numbers = "0123456789";

  let code = "";

  for (let i = 0; i < 3; i++) {
    code += letters[Math.floor(Math.random() * letters.length)];
  }

  for (let i = 0; i < 3; i++) {
    code += numbers[Math.floor(Math.random() * numbers.length)];
  }

  return code;
}

function generate() {
  let user = document.getElementById("username").value.trim();

  if (!user) {
    showToast("User ID required");
    return;
  }

  let pass = randomCode();

  lastResult =
`SECURE NOTIFICATION

Password reset request completed successfully.

User ID  : ${user}
Password  : ${pass}

Please use the new credentials to access your account.
Keep your credentials confidential.

Thank you.`;

  document.getElementById("output").innerText = lastResult;
}

function copyResult() {
  if (!lastResult) {
    showToast("Nothing to copy");
    return;
  }

  navigator.clipboard.writeText(lastResult)
    .then(() => showToast("Copied"))
    .catch(() => showToast("Failed"));
}

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 1800);
}
</script>

</body>
</html>
